<!-- ── Basic embed (copy this wherever you need it) ─────── -->
<iframe
  id="yfas-embed"
  src="https://yale-food-addiction-scale.vercel.app"
  title="Yale Food Addiction Scale 2.0 | Discover Health Group"
  width="100%"
  height="860"
  style="border:none; border-radius:12px; display:block; width:100%;"
  loading="lazy"
  allow="clipboard-write"
  referrerpolicy="strict-origin-when-cross-origin"
></iframe>

<!-- ── Optional: auto-resize script ──────────────────────── -->
<script>
  (function () {
    var frame = document.getElementById('yfas-embed');
    if (!frame) return;

    // Listen for height messages from the embedded page
    window.addEventListener('message', function (e) {
      if (
        e.origin === 'https://yale-food-addiction-scale.vercel.app' &&
        e.data && e.data.type === 'yfas-resize'
      ) {
        frame.style.height = e.data.height + 'px';
      }
    });

    // Fallback: expand on mobile to avoid inner scroll
    function fixHeight() {
      if (window.innerWidth < 600) frame.style.height = '1100px';
      else frame.style.height = '860px';
    }
    window.addEventListener('resize', fixHeight);
    fixHeight();
  })();
</script>
